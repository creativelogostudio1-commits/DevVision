<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevVision ULTRA</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

/* BODY */
body{
    background:#020617;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.7);
    position:sticky;
    top:0;
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav h2{color:#38bdf8;}

.nav-links{
    display:flex;
}

.nav-links a{
    margin:10px;
    text-decoration:none;
    color:white;
}

.menu-btn{
    display:none;
    font-size:25px;
    cursor:pointer;
}

/* HERO */
.hero{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    padding:80px 30px;
}

.hero-text{flex:1;}
.hero-text h1{font-size:50px;}
.hero-text span{color:#38bdf8;}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#38bdf8;
    color:black;
    border-radius:8px;
    text-decoration:none;
}

.btn-outline{
    border:1px solid #38bdf8;
    padding:12px 25px;
    border-radius:8px;
    margin-left:10px;
    color:#38bdf8;
    text-decoration:none;
}

.hero img{
    flex:1;
    max-width:500px;
    border-radius:15px;
}

/* SERVICES */
.services{
    padding:60px;
    text-align:center;
}

.service-grid{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.service{
    background:#0f172a;
    padding:25px;
    border-radius:15px;
    width:260px;
    transition:0.3s;
    cursor:pointer;
}

.service:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px rgba(56,189,248,0.4);
}

/* PROJECTS */
.projects{
    padding:60px;
    text-align:center;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

.card{
    width:280px;
    background:#0f172a;
    padding:15px;
    border-radius:15px;
}

.card img{
    width:100%;
    border-radius:10px;
}

/* CONTACT */
input,textarea{
    width:80%;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50px;
    text-decoration:none;
    color:white;
}

/* MOBILE */
@media(max-width:768px){
    .nav-links{
        display:none;
        flex-direction:column;
        background:#000;
        position:absolute;
        top:60px;
        right:0;
        width:200px;
    }

    .menu-btn{display:block;}
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2>DevVision</h2>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="nav-links" id="menu">
<a href="#">Accueil</a>
<a href="#services">Services</a>
<a href="#projects">Projets</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-text">
<p>💻 Développeur Web</p>
<h1>Je crée des solutions <span>digitales puissantes</span></h1>

<a class="btn" href="#projects">Voir mes projets</a>
<a class="btn-outline" href="#">Télécharger CV</a>
</div>

<img src="images/projet-web.jpg">

</section>

<!-- SERVICES -->
<section id="services" class="services">
<h2>💼 Mes Services</h2>

<div class="service-grid">

<div class="service" onclick="alert('Création de site professionnel')">
🌐 Création de site web
</div>

<div class="service" onclick="alert('Applications JavaScript')">
⚙️ Applications Web
</div>

<div class="service" onclick="alert('Design moderne')">
🎨 UI/UX Design
</div>

<div class="service" onclick="alert('Gestion réseaux')">
📱 Réseaux sociaux
</div>

</div>
</section>

<!-- PROJECTS -->
<section id="projects" class="projects">
<h2>🚀 Projets</h2>

<div class="cards">

<div class="card">
<img src="images/profil-dev.jpg">
<h3>Portfolio</h3>
</div>

<div class="card">
<img src="images/projet-web.jpg">
<h3>Dashboard</h3>
</div>

<div class="card">
<img src="images/banniere-cservice.jpg">
<h3>C-Service</h3>
</div>

</div>
</section>

<!-- CONTACT -->
<section id="contact" style="padding:60px;text-align:center;">
<h2>Contact</h2>

<input placeholder="Nom"><br>
<input placeholder="Email"><br>
<textarea placeholder="Message"></textarea><br>

<button class="btn" onclick="sendWhatsApp()">Envoyer via WhatsApp</button>

</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/243848681325">💬</a>

<!-- SCRIPT -->
<script>

function toggleMenu(){
    let menu = document.getElementById("menu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

function sendWhatsApp(){
    let nom = document.querySelector('input').value;
    let message = document.querySelector('textarea').value;

    let url = "https://wa.me/243848681325?text=Nom:"+nom+" Message:"+message;
    window.open(url);
}

</script>

</body>
</html>
